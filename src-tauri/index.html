<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header {
            text-align: center;
        }

        .title {
            font-size: 2.8rem;
            font-weight: bold;
            color: #4ade80;
            text-shadow: 0 0 30px rgba(74, 222, 128, 0.6);
            margin-bottom: 15px;
            letter-spacing: 4px;
        }

        .score-panel {
            display: flex;
            gap: 40px;
            font-size: 1.2rem;
            color: #94a3b8;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-label {
            color: #64748b;
        }

        .score-value {
            color: #fbbf24;
            font-weight: bold;
            font-size: 1.4rem;
            min-width: 50px;
            text-align: center;
        }

        .high-score .score-value {
            color: #f472b6;
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 
                0 0 0 3px #4ade80,
                0 0 40px rgba(74, 222, 128, 0.4),
                0 25px 80px rgba(0, 0, 0, 0.6);
        }

        canvas {
            display: block;
            background: #0a0a1a;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-title {
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 0 0 20px currentColor;
        }

        .overlay-title.game-over {
            color: #ef4444;
        }

        .overlay-title.start-title {
            color: #4ade80;
        }

        .overlay-score {
            font-size: 1.3rem;
            color: #94a3b8;
        }

        .overlay-score .value {
            color: #fbbf24;
            font-weight: bold;
            font-size: 2rem;
            display: block;
            margin-top: 8px;
        }

        .overlay-hint {
            font-size: 1rem;
            color: #64748b;
            animation: pulse 2s ease-in-out infinite;
        }

        .new-record {
            color: #f472b6;
            font-weight: bold;
            font-size: 1.1rem;
            animation: bounce 0.6s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .btn {
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #0a0a1a;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(74, 222, 128, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(74, 222, 128, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .controls {
            color: #64748b;
            font-size: 0.95rem;
            text-align: center;
        }

        .controls kbd {
            display: inline-block;
            padding: 5px 10px;
            background: #1e293b;
            border-radius: 6px;
            border: 1px solid #334155;
            color: #94a3b8;
            font-family: inherit;
            margin: 0 3px;
            box-shadow: 0 2px 0 #0f172a;
        }

        .controls-row {
            margin: 8px 0;
        }

        .mobile-controls {
            display: none;
            gap: 10px;
            margin-top: 15px;
        }

        @media (max-width: 500px) {
            .title {
                font-size: 2rem;
            }
            
            .score-panel {
                gap: 20px;
                font-size: 1rem;
            }

            .controls {
                display: none;
            }

            .mobile-controls {
                display: grid;
                grid-template-areas: 
                    ". up ."
                    "left . right"
                    ". down .";
                gap: 8px;
            }

            .mobile-btn {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
                background: #1e293b;
                color: #94a3b8;
                border: 2px solid #334155;
                border-radius: 12px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .mobile-btn:active {
                background: #334155;
            }

            .mobile-btn.up { grid-area: up; }
            .mobile-btn.down { grid-area: down; }
            .mobile-btn.left { grid-area: left; }
            .mobile-btn.right { grid-area: right; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1 class="title">🐍 贪吃蛇</h1>
            <div class="score-panel">
                <div class="score-item">
                    <span class="score-label">当前分数:</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-item high-score">
                    <span class="score-label">最高分:</span>
                    <span class="score-value" id="highScore">0</span>
                </div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <!-- 开始界面 -->
            <div class="overlay show" id="startOverlay">
                <div class="overlay-title start-title">贪吃蛇</div>
                <button class="btn" id="startBtn">开始游戏</button>
                <div class="overlay-hint">按空格键或点击按钮开始</div>
            </div>
            
            <!-- 游戏结束界面 -->
            <div class="overlay" id="gameOverOverlay">
                <div class="overlay-title game-over">游戏结束</div>
                <div class="overlay-score">
                    本局得分
                    <span class="value" id="finalScore">0</span>
                </div>
                <div class="new-record" id="newRecord" style="display: none;">🎉 新纪录！</div>
                <button class="btn" id="restartBtn">再来一局</button>
                <div class="overlay-hint">按空格键或点击按钮重新开始</div>
            </div>
        </div>

        <div class="controls">
            <div class="controls-row">
                <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动
            </div>
            <div class="controls-row">
                <kbd>空格</kbd> 暂停/继续
            </div>
        </div>

        <!-- 移动端控制按钮 -->
        <div class="mobile-controls" id="mobileControls">
            <button class="mobile-btn up" data-dir="up">↑</button>
            <button class="mobile-btn left" data-dir="left">←</button>
            <button class="mobile-btn right" data-dir="right">→</button>
            <button class="mobile-btn down" data-dir="down">↓</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const CONFIG = {
            GRID_SIZE: 20,
            CELL_SIZE: 20,
            GAME_SPEED: 120,
            INITIAL_LENGTH: 3
        };

        // 获取元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const newRecordEl = document.getElementById('newRecord');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const mobileControls = document.getElementById('mobileControls');

        // 游戏状态
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameOver = false;
        let gameLoop = null;

        // 初始化
        function init() {
            snake = [];
            const startX = Math.floor(CONFIG.GRID_SIZE / 2);
            const startY = Math.floor(CONFIG.GRID_SIZE / 2);
            
            for (let i = 0; i < CONFIG.INITIAL_LENGTH; i++) {
                snake.push({ x: startX - i, y: startY });
            }
            
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameOver = false;
            gamePaused = false;
            
            spawnFood();
            updateUI();
            draw();
        }

        // 生成食物
        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * CONFIG.GRID_SIZE),
                    y: Math.floor(Math.random() * CONFIG.GRID_SIZE)
                };
                valid = !snake.some(seg => seg.x === food.x && seg.y === food.y);
            }
        }

        // 更新UI
        function updateUI() {
            scoreEl.textContent = score;
            highScoreEl.textContent = highScore;
        }

        // 绘制网格背景
        function drawBackground() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 网格线
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 1;
            
            for (let i = 0; i <= CONFIG.GRID_SIZE; i++) {
                const pos = i * CONFIG.CELL_SIZE;
                ctx.beginPath();
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, pos);
                ctx.lineTo(canvas.width, pos);
                ctx.stroke();
            }
        }

        // 绘制食物
        function drawFood() {
            const x = food.x * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
            const y = food.y * CONFIG.CELL_SIZE + CONFIG.CELL_SIZE / 2;
            const radius = CONFIG.CELL_SIZE / 2 - 2;
            
            // 发光效果
            ctx.shadowColor = '#ef4444';
            ctx.shadowBlur = 15;
            
            // 渐变填充
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(1, '#ef4444');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }

        // 绘制蛇
        function drawSnake() {
            snake.forEach((seg, index) => {
                const isHead = index === 0;
                const x = seg.x * CONFIG.CELL_SIZE;
                const y = seg.y * CONFIG.CELL_SIZE;
                const size = CONFIG.CELL_SIZE - 2;
                const radius = isHead ? 6 : 4;
                
                // 蛇身渐变
                const alpha = 1 - (index / snake.length) * 0.4;
                
                if (isHead) {
                    ctx.shadowColor = '#4ade80';
                    ctx.shadowBlur = 12;
                    ctx.fillStyle = '#4ade80';
                } else {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = `rgba(34, 197, 94, ${alpha})`;
                }
                
                // 圆角矩形
                ctx.beginPath();
                ctx.roundRect(x + 1, y + 1, size, size, radius);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                // 蛇头眼睛
                if (isHead) {
                    ctx.fillStyle = '#0a0a1a';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    
                    let eye1X, eye1Y, eye2X, eye2Y;
                    
                    if (nextDirection.x === 1) {
                        eye1X = x + CONFIG.CELL_SIZE - 7;
                        eye1Y = y + eyeOffset;
                        eye2X = x + CONFIG.CELL_SIZE - 7;
                        eye2Y = y + CONFIG.CELL_SIZE - eyeOffset - eyeSize;
                    } else if (nextDirection.x === -1) {
                        eye1X = x + 7;
                        eye1Y = y + eyeOffset;
                        eye2X = x + 7;
                        eye2Y = y + CONFIG.CELL_SIZE - eyeOffset - eyeSize;
                    } else if (nextDirection.y === -1) {
                        eye1X = x + eyeOffset;
                        eye1Y = y + 7;
                        eye2X = x + CONFIG.CELL_SIZE - eyeOffset - eyeSize;
                        eye2Y = y + 7;
                    } else {
                        eye1X = x + eyeOffset;
                        eye1Y = y + CONFIG.CELL_SIZE - 7;
                        eye2X = x + CONFIG.CELL_SIZE - eyeOffset - eyeSize;
                        eye2Y = y + CONFIG.CELL_SIZE - 7;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        // 主绘制函数
        function draw() {
            drawBackground();
            drawFood();
            drawSnake();
        }

        // 更新游戏逻辑
        function update() {
            if (gamePaused || gameOver || !gameRunning) return;
            
            // 应用方向
            direction = { ...nextDirection };
            
            // 计算新头部位置
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            // 撞墙检测
            if (head.x < 0 || head.x >= CONFIG.GRID_SIZE || 
                head.y < 0 || head.y >= CONFIG.GRID_SIZE) {
                endGame();
                return;
            }
            
            // 撞自己检测
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                endGame();
                return;
            }
            
            // 添加新头部
            snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateUI();
                spawnFood();
            } else {
                snake.pop();
            }
            
            draw();
        }

        // 游戏结束
        function endGame() {
            gameOver = true;
            gameRunning = false;
            clearInterval(gameLoop);
            
            finalScoreEl.textContent = score;
            
            // 检查是否破纪录
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                updateUI();
                newRecordEl.style.display = 'block';
            } else {
                newRecordEl.style.display = 'none';
            }
            
            gameOverOverlay.classList.add('show');
        }

        // 开始游戏
        function startGame() {
            startOverlay.classList.remove('show');
            gameOverOverlay.classList.remove('show');
            
            init();
            gameRunning = true;
            
            gameLoop = setInterval(update, CONFIG.GAME_SPEED);
        }

        // 重新开始
        function restartGame() {
            gameOverOverlay.classList.remove('show');
            startGame();
        }

        // 切换暂停
        function togglePause() {
            if (gameOver || !gameRunning) return;
            
            gamePaused = !gamePaused;
        }

        // 设置方向
        function setDirection(dir) {
            const directions = {
                'up': { x: 0, y: -1 },
                'down': { x: 0, y: 1 },
                'left': { x: -1, y: 0 },
                'right': { x: 1, y: 0 }
            };
            
            const newDir = directions[dir];
            if (!newDir) return;
            
            // 防止180度转向
            const isOpposite = (a, b) => 
                a.x === -b.x && a.y === -b.y;
            
            if (!isOpposite(newDir, direction)) {
                nextDirection = newDir;
            }
            
            // 如果游戏未开始，自动开始
            if (!gameRunning && !gameOver && !gamePaused) {
                startGame();
            }
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            switch (key) {
                case 'arrowup':
                case 'w':
                    e.preventDefault();
                    setDirection('up');
                    break;
                case 'arrowdown':
                case 's':
                    e.preventDefault();
                    setDirection('down');
                    break;
                case 'arrowleft':
                case 'a':
                    e.preventDefault();
                    setDirection('left');
                    break;
                case 'arrowright':
                case 'd':
                    e.preventDefault();
                    setDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    if (gameOver) {
                        restartGame();
                    } else if (!gameRunning) {
                        startGame();
                    } else {
                        togglePause();
                    }
                    break;
                case 'enter':
                    if (gameOver) {
                        restartGame();
                    } else if (!gameRunning) {
                        startGame();
                    }
                    break;
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);

        // 移动端控制
        mobileControls.querySelectorAll('.mobile-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setDirection(btn.dataset.dir);
            });
            
            // 防止重复触发
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                setDirection(btn.dataset.dir);
            });
        });

        // 初始化显示
        highScoreEl.textContent = highScore;
        init();
        draw();
    </script>
</body>
</html>
