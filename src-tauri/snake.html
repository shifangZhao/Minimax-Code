<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header {
            text-align: center;
        }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #4ade80;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
            margin-bottom: 10px;
        }

        .info {
            display: flex;
            gap: 30px;
            font-size: 1.1rem;
            color: #94a3b8;
        }

        .info span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .score-value {
            color: #fbbf24;
            font-weight: bold;
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 
                0 0 0 3px #4ade80,
                0 0 30px rgba(74, 222, 128, 0.3),
                0 20px 60px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            background: #0f172a;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-title {
            font-size: 2rem;
            font-weight: bold;
            color: #ef4444;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        .overlay-score {
            font-size: 1.2rem;
            color: #94a3b8;
        }

        .overlay-score .value {
            color: #fbbf24;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .overlay-hint {
            font-size: 1rem;
            color: #64748b;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .controls {
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
        }

        .controls kbd {
            display: inline-block;
            padding: 4px 8px;
            background: #1e293b;
            border-radius: 4px;
            border: 1px solid #334155;
            color: #94a3b8;
            font-family: inherit;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1 class="title">贪吃蛇</h1>
            <div class="info">
                <span>分数: <b class="score-value" id="score">0</b></span>
                <span>长度: <b class="score-value" id="length">3</b></span>
            </div>
        </div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="overlay" id="pauseOverlay">
                <div class="overlay-title">已暂停</div>
                <div class="overlay-hint">按空格键继续</div>
            </div>
            <div class="overlay" id="gameOverOverlay">
                <div class="overlay-title">游戏结束</div>
                <div class="overlay-score">得分: <span class="value" id="finalScore">0</span></div>
                <div class="overlay-hint">按 R 重新开始</div>
            </div>
        </div>
        <div class="controls">
            <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动
            &nbsp;&nbsp;
            <kbd>空格</kbd> 暂停
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const lengthEl = document.getElementById('length');
        const finalScoreEl = document.getElementById('finalScore');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;
        const GAME_SPEED = 120;

        let snake, direction, food, score, gameRunning, gamePaused, gameOver;
        let lastDirection = 'RIGHT';

        function init() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            lastDirection = 'RIGHT';
            score = 0;
            gameRunning = false;
            gamePaused = false;
            gameOver = false;
            spawnFood();
            updateUI();
            gameOverOverlay.classList.remove('show');
            pauseOverlay.classList.remove('show');
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                valid = !snake.some(seg => seg.x === food.x && seg.y === food.y);
            }
        }

        function updateUI() {
            scoreEl.textContent = score;
            lengthEl.textContent = snake.length;
        }

        function draw() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 网格线
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // 食物
            ctx.fillStyle = '#ef4444';
            ctx.shadowColor = '#ef4444';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 2,
                0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 蛇身
            snake.forEach((seg, i) => {
                const isHead = i === 0;
                ctx.fillStyle = isHead ? '#4ade80' : '#22c55e';
                
                if (isHead) {
                    ctx.shadowColor = '#4ade80';
                    ctx.shadowBlur = 8;
                }

                const padding = 1;
                ctx.beginPath();
                ctx.roundRect(
                    seg.x * CELL_SIZE + padding,
                    seg.y * CELL_SIZE + padding,
                    CELL_SIZE - padding * 2,
                    CELL_SIZE - padding * 2,
                    isHead ? 6 : 4
                );
                ctx.fill();
                ctx.shadowBlur = 0;

                // 蛇头眼睛
                if (isHead) {
                    ctx.fillStyle = '#0f172a';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    
                    let eye1X, eye1Y, eye2X, eye2Y;
                    if (direction.x === 1) {
                        eye1X = seg.x * CELL_SIZE + CELL_SIZE - 6;
                        eye1Y = seg.y * CELL_SIZE + eyeOffset;
                        eye2X = seg.x * CELL_SIZE + CELL_SIZE - 6;
                        eye2Y = seg.y * CELL_SIZE + CELL_SIZE - eyeOffset - eyeSize;
                    } else if (direction.x === -1) {
                        eye1X = seg.x * CELL_SIZE + 6;
                        eye1Y = seg.y * CELL_SIZE + eyeOffset;
                        eye2X = seg.x * CELL_SIZE + 6;
                        eye2Y = seg.y * CELL_SIZE + CELL_SIZE - eyeOffset - eyeSize;
                    } else if (direction.y === 1) {
                        eye1X = seg.x * CELL_SIZE + eyeOffset;
                        eye1Y = seg.y * CELL_SIZE + CELL_SIZE - 6;
                        eye2X = seg.x * CELL_SIZE + CELL_SIZE - eyeOffset - eyeSize;
                        eye2Y = seg.y * CELL_SIZE + CELL_SIZE - 6;
                    } else {
                        eye1X = seg.x * CELL_SIZE + eyeOffset;
                        eye1Y = seg.y * CELL_SIZE + 6;
                        eye2X = seg.x * CELL_SIZE + CELL_SIZE - eyeOffset - eyeSize;
                        eye2Y = seg.y * CELL_SIZE + 6;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function update() {
            if (gamePaused || gameOver) return;

            // 保存上一步方向用于碰撞检测
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 撞墙检测
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                endGame();
                return;
            }

            // 撞自己检测
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateUI();
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function endGame() {
            gameOver = true;
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameOverOverlay.classList.add('show');
        }

        let gameLoop;
        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            gameOver = false;
            gameLoop = setInterval(() => {
                update();
                draw();
            }, GAME_SPEED);
        }

        function togglePause() {
            if (gameOver) return;
            
            gamePaused = !gamePaused;
            if (gamePaused) {
                pauseOverlay.classList.add('show');
            } else {
                pauseOverlay.classList.remove('show');
            }
        }

        function handleKeydown(e) {
            const key = e.key.toLowerCase();

            // 方向控制
            if ((key === 'arrowup' || key === 'w') && lastDirection !== 'DOWN') {
                direction = { x: 0, y: -1 };
                lastDirection = 'UP';
            } else if ((key === 'arrowdown' || key === 's') && lastDirection !== 'UP') {
                direction = { x: 0, y: 1 };
                lastDirection = 'DOWN';
            } else if ((key === 'arrowleft' || key === 'a') && lastDirection !== 'RIGHT') {
                direction = { x: -1, y: 0 };
                lastDirection = 'LEFT';
            } else if ((key === 'arrowright' || key === 'd') && lastDirection !== 'LEFT') {
                direction = { x: 1, y: 0 };
                lastDirection = 'RIGHT';
            }

            // 空格暂停
            if (key === ' ') {
                e.preventDefault();
                if (!gameOver) {
                    togglePause();
                }
            }

            // R重新开始
            if (key === 'r') {
                clearInterval(gameLoop);
                init();
                draw();
                startGame();
            }

            // 开始游戏
            if (!gameRunning && !gamePaused && key === ' ') {
                startGame();
            }
        }

        document.addEventListener('keydown', handleKeydown);

        // 初始化并绘制
        init();
        draw();
    </script>
</body>
</html>
